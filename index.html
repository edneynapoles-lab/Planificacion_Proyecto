<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Gantt PRO Estable</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<style>
body{font-family:Arial;background:#0b1020;color:white;padding:20px;}
.card{background:#111;padding:15px;border-radius:10px;margin-bottom:15px;}
button{margin:5px;padding:8px 12px;border-radius:8px;}
input{padding:6px;border-radius:6px;}
#gantt{background:#222;padding:20px;border-radius:10px;margin-top:10px;}
.bar{height:20px;background:#4caf50;margin:5px 0;}
</style>
</head>

<body>

<h2>Planificador Gantt</h2>

<input id="projectName" placeholder="Nombre del proyecto" style="width:300px;">
<input id="hoursPerDay" type="number" value="8">

<br><br>

<button onclick="generate()">🚀 Generar</button>
<button onclick="savePlan()">💾 Guardar</button>
<button onclick="exportJSON()">⬇️ Exportar</button>
<button onclick="importJSON()">📥 Importar</button>
<button onclick="sendMail()">📧 Mail</button>

<div id="gantt"></div>

<div class="card">
<h3>📚 Historial</h3>
<div id="history"></div>
</div>

<script>

let currentPlan = null;
const STORAGE_KEY = "gantt_pro";

function generate(){
  const name = document.getElementById("projectName").value || "Sin nombre";

  currentPlan = {
    id: Date.now(),
    nombre: name,
    fecha: new Date().toLocaleString(),
    tasks:[
      {name:"Desarrollo", days:5},
      {name:"Testing", days:3}
    ]
  };

  renderGantt();
}

function renderGantt(){
  const g = document.getElementById("gantt");

  g.innerHTML = "<h3>"+currentPlan.nombre+"</h3>";

  currentPlan.tasks.forEach(t=>{
    g.innerHTML += `<div>${t.name}</div><div class="bar" style="width:${t.days*50}px"></div>`;
  });
}

function savePlan(){
  if(!currentPlan){alert("Genera primero");return;}

  html2canvas(document.getElementById("gantt")).then(canvas=>{
    currentPlan.image = canvas.toDataURL();

    const plans = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
    plans.push(currentPlan);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(plans));

    renderHistory();
  });
}

function renderHistory(){
  const plans = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
  const h = document.getElementById("history");

  if(plans.length===0){
    h.innerHTML="Sin datos";
    return;
  }

  h.innerHTML = plans.map(p=>`
    <div style="margin-bottom:10px;">
      <b>${p.nombre}</b> (${p.fecha})
      <br>
      <img src="${p.image}" width="200">
      <br>
      <button onclick="load(${p.id})">Cargar</button>
    </div>
  `).join("");
}

function load(id){
  const plans = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
  const p = plans.find(x=>x.id===id);
  currentPlan = p;
  renderGantt();
}

function exportJSON(){
  const plans = localStorage.getItem(STORAGE_KEY);
  const blob = new Blob([plans],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "planes.json";
  a.click();
}

function importJSON(){
  const input = document.createElement("input");
  input.type="file";
  input.onchange=e=>{
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload=()=>{
      localStorage.setItem(STORAGE_KEY, reader.result);
      renderHistory();
    };
    reader.readAsText(file);
  };
  input.click();
}

function sendMail(){
  if(!currentPlan){alert("Genera primero");return;}

  let body = `Proyecto: ${currentPlan.nombre}\nFecha: ${currentPlan.fecha}\n\n`;

  currentPlan.tasks.forEach(t=>{
    body += `${t.name} - ${t.days} días\n`;
  });

  window.location.href = `mailto:?subject=Plan ${currentPlan.nombre}&body=${encodeURIComponent(body)}`;
}

renderHistory();

</script>

</body>
</html>
