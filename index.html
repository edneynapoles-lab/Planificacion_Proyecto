<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Gantt Pro</title>
</head>
<body>

<h2>Planificador Gantt</h2>

<button onclick="generate()">🚀 Generar</button>
<button onclick="savePlan()">💾 Guardar</button>

<h3>📚 Historial</h3>
<div id="list"></div>

<script>
const STORAGE_KEY = "gantt_planes_v2";

function getDummyData(){
  return {
    fecha: new Date().toLocaleString(),
    resumen: "Plan generado manualmente"
  };
}

function generate(){
  alert("Simulación de generación de Gantt");
}

function savePlan(){
  const plans = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  const plan = {
    id: Date.now(),
    fecha: new Date().toLocaleString(),
    data: getDummyData()
  };

  plans.push(plan);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(plans));

  render();
}

function render(){
  const plans = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  document.getElementById("list").innerHTML = plans.map(p => `
    <div style="margin-bottom:10px;">
      <b>${p.fecha}</b>
      <button onclick="sendMail(${p.id})">📧</button>
      <button onclick="addToCalendar(${p.id})">📅</button>
    </div>
  `).join("");
}

function sendMail(id){
  const plans = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  const plan = plans.find(p => p.id === id);

  const subject = encodeURIComponent("Plan Gantt");
  const body = encodeURIComponent(JSON.stringify(plan, null, 2));

  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

function addToCalendar(id){
  const start = new Date().toISOString().replace(/[-:]/g,"").split(".")[0];
  const end = start;

  const url = `https://outlook.office.com/calendar/0/deeplink/compose?subject=Plan%20Gantt&startdt=${start}&enddt=${end}`;

  window.open(url, "_blank");
}

render();
</script>

</body>
</html>
