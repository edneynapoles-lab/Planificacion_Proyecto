<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Gantt PRO Reporte</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
body{font-family:Arial;background:#0b1020;color:white;padding:20px;}
button{margin:5px;padding:8px 12px;border-radius:8px;}
#gantt{margin-top:20px;padding:20px;border:1px solid #555;}
</style>
</head>

<body>

<h2>Planificador Gantt</h2>

<input id="projectName" placeholder="Nombre del proyecto" style="width:300px;padding:6px">

<br><br>

<button onclick="generate()">🚀 Generar</button>
<button onclick="savePlan()">💾 Guardar</button>
<button onclick="sendMail()">📧 Mail</button>
<button onclick="exportPDF()">📄 PDF</button>

<div id="gantt">
  <h3 id="title">Gantt</h3>
  <p>Simulación visual del Gantt</p>
</div>

<script>

let currentPlan = null;

function generate(){
  const name = document.getElementById("projectName").value || "Sin nombre";

  currentPlan = {
    nombre: name,
    fecha: new Date().toLocaleString(),
    fases:[
      {name:"Desarrollo", horas:80, inicio:"2026-03-16", fin:"2026-03-27"},
      {name:"Testing", horas:40, inicio:"2026-03-28", fin:"2026-04-05"}
    ]
  };

  document.getElementById("title").innerText = "Gantt - " + name;
}

function savePlan(){
  if(!currentPlan){ alert("Genera primero"); return; }

  const plans = JSON.parse(localStorage.getItem("plans")||"[]");
  plans.push(currentPlan);
  localStorage.setItem("plans", JSON.stringify(plans));

  alert("Guardado");
  document.getElementById("projectName").value="";
}

function sendMail(){
  if(!currentPlan) return;

  let body = "PLANIFICACIÓN PROYECTO\n\n";
  body += "Proyecto: " + currentPlan.nombre + "\n";
  body += "Fecha: " + currentPlan.fecha + "\n\n";

  currentPlan.fases.forEach(f=>{
    body += f.name + "\n";
    body += "Horas: " + f.horas + "\n";
    body += "Inicio: " + f.inicio + "\n";
    body += "Fin: " + f.fin + "\n\n";
  });

  const subject = encodeURIComponent("Plan " + currentPlan.nombre);
  const bodyEnc = encodeURIComponent(body);

  window.location.href = `mailto:?subject=${subject}&body=${bodyEnc}`;
}

function exportPDF(){
  const element = document.getElementById("gantt");

  html2canvas(element).then(canvas=>{
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jspdf.jsPDF();
    pdf.setFontSize(16);
    pdf.text("Planificación - " + (currentPlan?.nombre||""), 10, 10);

    pdf.addImage(imgData, 'PNG', 10, 20, 180, 100);

    pdf.save("gantt.pdf");
  });
}

</script>

</body>
</html>
