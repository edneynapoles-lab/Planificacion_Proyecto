<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Planificador Gantt PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0b1020;
  --card:rgba(255,255,255,.06);
  --text:#fff;
  --muted:rgba(255,255,255,.6);
  --primary:#7c5cff;
}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#070a14,#0b1020);
  color:var(--text);
}
.container{max-width:1200px;margin:auto;padding:20px}
.card{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
  backdrop-filter:blur(12px);
}
h1{margin:0 0 10px;font-size:22px}
input{
  border-radius:10px;
  padding:6px 8px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.25);
  color:#fff;
  font-size:12px;
}
input.small{width:70px;text-align:center;}
input.medium{width:120px;}
input.project{width:320px;font-size:14px;padding:8px 10px;}
button{
  background:var(--primary);
  border:none;
  padding:8px 10px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;border-bottom:1px solid rgba(255,255,255,.1)}
.bar{
  height:18px;
  border-radius:999px;
  background:linear-gradient(90deg,#7c5cff,#00e0a4);
  margin:6px 0;
}
</style>
</head>
<body>
<div class="container">

<h1>🚀 Planificador Gantt PRO</h1>

<div class="card">
<input id="projectName" class="project" placeholder="Nombre del proyecto">
<input id="hoursPerDay" class="small" type="number" value="8" min="1">
<button onclick="generate()">Generar</button>
</div>

<div class="grid">
<div class="card">
<h3>Datos</h3>
<table>
<thead>
<tr><th>Fase</th><th>Horas</th><th>Recursos</th><th>Inicio</th><th>Fin</th></tr>
</thead>
<tbody id="tasks"></tbody>
</table>
</div>

<div class="card">
<h3>Resumen</h3>
<div>Total horas: <strong id="totalHours">-</strong></div>
<div>Duración: <strong id="totalDays">-</strong></div>
<canvas id="chart"></canvas>
</div>
</div>

<div class="card">
<h3>Gantt</h3>
<div id="gantt"></div>
</div>

</div>

<script>
const TASKS=[
{id:"t1",name:"Desarrollo"},
{id:"t2",name:"QA"},
{id:"t3",name:"Testing"},
{id:"t4",name:"Deploy"},
{id:"t5",name:"Certificación"}
];

function init(){
const tbody=document.getElementById("tasks");
TASKS.forEach(t=>{
 const tr=document.createElement("tr");
 tr.innerHTML=`
 <td>${t.name}</td>
 <td><input class="small" id="${t.id}_h"></td>
 <td><input class="small" id="${t.id}_r" value="1"></td>
 <td><input class="medium" id="${t.id}_s"></td>
 <td><input class="medium" id="${t.id}_e" readonly></td>`;
 tbody.appendChild(tr);
});
flatpickr("#t1_s",{dateFormat:"Y-m-d"});
}

function generate(){
let current=new Date(document.getElementById("t1_s").value);
let hpd=Number(document.getElementById("hoursPerDay").value);
let totalH=0,totalD=0;
let cumulative=[],sum=0,ganttHTML="";

TASKS.forEach(t=>{
 let h=Number(document.getElementById(`${t.id}_h`).value||0);
 let r=Number(document.getElementById(`${t.id}_r`).value||1);
 let days=Math.ceil(h/(hpd*r));

 let start=new Date(current);
 let end=new Date(current);
 end.setDate(end.getDate()+days);

 document.getElementById(`${t.id}_s`).value=start.toISOString().split("T")[0];
 document.getElementById(`${t.id}_e`).value=end.toISOString().split("T")[0];

 totalH+=h;
 totalD+=days;
 sum+=h;
 cumulative.push(sum);

 ganttHTML+=`<div>${t.name}<div class="bar" style="width:${days*40}px"></div></div>`;

 current=end;
});

document.getElementById("gantt").innerHTML=`<h4>${projectName.value}</h4>`+ganttHTML;
document.getElementById("totalHours").innerText=totalH+"h";
document.getElementById("totalDays").innerText=totalD+"d";

new Chart(document.getElementById("chart"),{
 type:"line",
 data:{labels:TASKS.map(t=>t.name),datasets:[{label:"Esfuerzo acumulado",data:cumulative,fill:true}]}
});
}

init();
</script>

</body>
</html>
